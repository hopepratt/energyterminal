    <div class="card"><div class="card-icon">📝</div><h3>Cold Email Templates</h3>
    <p>Attached below are multiple cold email templates that have gotten proven responses! Use the templates to reach out to industry professionals that you are hoping to network with.</p>
    <div class="accordion-item">
    <div class="accordion-header" onclick="toggleAccordion(this)">
      <h3 class="">Template 1 — Referral Introduction</h3>
      <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
    </div>
    <div class="accordion-body">
      <div class="accordion-body-inner">
        <p>Hello ____,</p>
        <p>My name is _____, and I am a student at _______ studying _________. I was connected to you from ______. It's great to meet you! I am really interested in the clean energy and renewable sector, and know that your company ______ is doing a lot of great work with ___(Insert company's role in energy transition). I would love to learn more about the company and the work that you do, as well as hear about your experiences  ___(insert past experience of the person )_____ at ___(past/current organization of the person)__! I am currently working at ______ and have lot of previous experience working in the energy sector</p>
        <p>Please let me know what days and times work best for you, and I can send over a calendar invite!</p>
        <p>I look forward to learning more about the company and your work!</p>
        <p>Best,<br>______</p>
        <p><em>( Add an email signature to seem more professional)</em></p>
      </div>
    </div>
  </div>
  <div class="accordion-item">

    <div class="card"><div class="card-icon">📖</div><h3>Common Energy Acronyms</h3>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>AC — Alternating Current</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">A type of electrical current in which the direction of the flow of electrons switches back and forth at regular intervals. Most current flowing in power lines and household electricity coming from wall outlets is alternating current. Easier to increase or decrease the voltage of AC with transformers.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>BESS — Battery Energy Storage System</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">Rechargeable batteries that can store energy from different sources and discharge it when needed, most commonly paired with solar. Battery energy storage systems vary in size (residential, commercial, utility-scale), chemistry, and storage duration. Key for addressing renewable intermittency.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>CAPEX — Capital Expenditures</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Funds used by a company to acquire, upgrade, and maintain long-term physical assets. In energy terms, this most often refers to the upfront cost of building a new power plant.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>CCUS — Carbon Capture Utilization and Storage</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Process that captures carbon dioxide emissions from large point sources (such as fossil power plants or industrial facilities) and either reuses or stores it so it will not enter the atmosphere. Currently an expensive process but will be crucial for difficult to decarbonize sectors and may become more prevalent in light of recent EPA rules.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>CF — Capacity Factor</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Ratio of the actual electrical energy produced by a generating unit over a period of time compared to its theoretical maximum power production during the same period. For example, nuclear has a high capacity factor while solar has a relatively low capacity factor (given its lack of production at night).</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3 class="">COD — Commercial Operations Date</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>The date large-scale energy projects come online and begin generating power to earn revenue.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>DAC — Direct Air Capture</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">Process that extracts CO2 directly from the atmosphere at any location (not just large point source emitters) for permanent storage. Considered a carbon removal technique rather than carbon capture. Energy-intensive and currently very expensive.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>DC — Direct Current</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>An electric current following one direction only. Direct current is used for recharging batteries and transmitting electricity over long distances to minimize loss. Solar panels also produce direct current.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>DER — Distributed Energy Resource</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Small-scale energy resources usually situated near sites of electricity use, such as rooftop solar panels and battery storage.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>EPC — Engineering, Procurement, and Construction</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Firms in charge of getting a large-scale energy infrastructure project built. They create engineering blueprints, purchase raw materials, and physically construct the project. The EPC may or may not be owned by the independent power producer (see below) that "developed" (planned/financed) the project.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>IOU — Investor-Owned Utility</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Private (for-profit), monopoly utilities that generate and distribute power to electric customers over their defined service territory. Regulated by PUCs (see below). Examples include Duke Energy, Southern Company, First Energy, Dominion Energy, etc.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>IPP — Independent Power Producer</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">Also known as a non-utility generator (NUG), an IPP is an entity that is not a public utility but owns facilities to generate electricity for sale to utilities or end users. Most energy developers are considered IPPs (i.e. Pattern Energy, Cypress Creek Renewables, etc.). It is important to note that some utilities have IPP branches that operate in complete isolation from the utility (i.e NextEra Energy, Duke Energy, etc.).</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>IRP — Integrated Resource Plan</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>An assessment of future electricity needs and a plan to meet those future needs carried out by public utilities. Essentially a planning tool to help utilities forecast their future energy mix.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>ISO — Independent System Operator</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">Independent organizations that handle electric grid operations, electricity market facilitation, and bulk electric system planning. Similar to RTOs but generally have a smaller service territory.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>ITC — Investment Tax Credit</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Most often utilized for solar plant construction, ITCs reduce the federal income tax liability for a developer by a certain percent of the total system cost (CAPEX). Currently, the federal ITC for renewables is 30%, but there are additional 10% bonuses for meeting domestic content requirements and being located in "energy communities." Often developers don't use the tax credits themselves, but sell them to banks through tax equity deals.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>kW — Kilowatt</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">1,000 watts, a measure of power. 1 watt = 1 joule per second. For example, power tools and air fryers typically require about 1 kW of power.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>kWh — Kilowatt Hour</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">1,000 Watt hours, a measure of energy. It is the unit of measure for using 1 kW of power for one hour. For example, if a power tool was rated at 1 kW and you used it for 1 hour, you would have consumed 1 kWh of electricity. The average U.S. household consumes 29 kWh/day.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>LCOE — Levelized Cost of Energy/Electricity</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Measures lifetime costs of a power plant divided by total energy production. Inputs include CAPEX, fuel costs (if applicable), operations &amp; maintenance expenses, etc. Used to compare the relative prices of different types of energy generation.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>LNG — Liquified Natural Gas</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Natural gas that has been cooled to liquid form (~260° Fahrenheit) to allow for long-distance shipping and extended storage. LNG is generally more expensive than pipeline natural gas, but it has created a global gas market and is the only feasible source of gas for some countries without reserves. The U.S. is currently building out its LNG export capacity.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>MW — Megawatt</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>1,000,000 watts, a measure of power. 1 watt = 1 joule per second. 1 MW is roughly enough electricity for the instantaneous demand of 750 homes at once.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>MWh — Megawatt Hour</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>1,000,000 Watt hours, a measure of energy. It is the unit of measure for using 1 MW of power for one hour. The average U.S. household uses a little over 1MWh/month.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>NGCC — Natural Gas Combined Cycle</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">The dominant type of natural gas power plant in operation, a combined cycle plant captures excess heat from the gas turbine in order to run an additional steam turbine. This in turn is much more efficient than a traditional single turbine gas plant.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>O&amp;M — Operations &amp; Maintenance</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Activities associated with running and maintaining the power plant once it is in operation. Includes replacing broken parts, cleaning solar panels, landscaping, etc.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3 class="">PPA — Power Purchase Agreement</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Long-term contract between an electricity generator and a customer (most often utilities and large companies). Most large-scale renewables projects have a PPA, as having a guaranteed buyer of the generated electricity at a set rate derisks the project and justifies the upfront capital spend.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>PTC — Production Tax Credit</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Tax credits that are generated per kilowatt-hour of electricity produced by qualifying renewables facilities during the first 10 years of operation (up to 2.75 cents/kWh). Generally developers can either claim a production tax credit or investment tax credit, not both. Wind farms are the most likely to claim the production tax credits.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>PUC — Public Utility Commission</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">Quasi-governmental body that provides oversight and/or regulation of public utilities in a certain area (usually a state). Approve electric rates and capital expenditures of IOUs. Their goal is generally to ensure that utilities provide reasonable, adequate and efficient service to customers at just and reasonable prices.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3 class="">PV — Photovoltaic</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">Essentially "solar." Usually appears as PV (solar) plant or PV (solar) cell, which is a nonmechanical device that converts sunlight directly into electricity.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3 class="">RTO — Regional Transmission Operator</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p class="">Organization that coordinates, controls, and monitors the operation of the electric power system across a large geographic area. Serves the same functions as an ISO, but RTOs are generally larger, often spanning across many states.</p>
      </div></div>
    </div>

    <div class="card"><div class="card-icon">🤝</div><h3 class="">Networking Guide</h3>
    <p class="">Networking is often viewed as a necessary evil or an awkward task, but it doesn't have to be.</p>
    <p style="color:var(--gray);font-size:0.93rem;line-height:1.7;" class="">This guide will serve as an introduction to networking and walk you through the process of a successful networking experience.</p>
    <p style="color:var(--gray);font-size:0.93rem;line-height:1.7;" class="">Starting off, here are a few things to keep in mind.</p>
    <ul style="color:var(--gray);font-size:0.93rem;line-height:2;margin:12px 0 20px 20px;">
      <li>Most people enjoy connecting with students. That ".edu" email is a huge asset and will open a lot of doors, so don't be shy.</li>
      <li>Know your audience and do your homework. Personalization is key, and know how to adjust your tone to fit the situation.</li>
      <li>Don't ask for a job (at least not right away).</li>
      <li>Networking compounds itself. Consistent effort is critical to seeing exponential benefits</li>
    </ul>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Step 1: Finding the Right Tools</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>LinkedIn will be your friend here. If you haven't already, make sure to touch up your profile with the most recent information, such as any recent work experience or projects. Alumni databases are also an excellent place to find people from your school working in your desired industry or in your desired role. Most of them have their emails included, too.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Step 2: Finding the Right People to Network With</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>To get to this point, we'll assume you've narrowed down your interest to a specific group or type of company. If not, see our "how to narrow your interests in the energy industry" or head over to our Energy Verticals page to read up on a few verticals you might be interested in. Once you've done that and identified a few companies you might be interested in, come back here for the next steps.</p>
        <p>There are two important things to keep in mind when you're identifying the right person to reach out to. First, who is going to have the right experience or information to answer my question? Second, what common ground can I establish with this person?</p>
        <p>For the first point, look for job titles that match your interests. For example, if you're interested in a marketing role, look for keywords like "marketing" or "communications."</p>
        <p class="">For the second point, scroll through their LinkedIn profile to learn more about them. Did they have the same major as you? Did they go to the same school? Are they from the same city? All of these points can be great conversation starters and make them more likely to connect with you. Alumni of your school can be a great place to start, and many schools have an online database where you can find emails, bios, and more.</p>
        <p>Another common question is what level of seniority you should target. In general, for most informational interviews, we would recommend someone within 10 years of your current level of experience. They were in your shoes not too long ago, can relate to you well, and can provide greater insight into entry level positions like the ones you might be interested in. Plus, they're probably more likely to respond.</p>
        <p>At the end of this step, we've found our ideal target. On to step 3!</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Step 3: Crafting the Perfect Message</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>For this step, head over to our LinkedIn message or cold email templates for more information.</p>
        <p>Here are a few things to keep in mind:</p>
        <ul style="color:var(--gray);font-size:0.93rem;line-height:2;margin:12px 0 20px 20px;">
          <li>Keep it short.</li>
          <li>Make it personal.</li>
          <li>Have a clear ask.</li>
        </ul>
        <p><strong>Keep it short:</strong> A great message should be short enough that they can read it in 20-30 seconds and clear enough that they can instantly understand why you're reaching out to them. You don't need to recite your resume; a simple one-liner including your school, major, and relevant position at a company/organization will do. Ex.: "I'm a Duke engineering student and the Co-Founder of Energy Terminal."</p>
        <p class=""><strong>Make it personal:</strong> Do your homework not just before the call, but before the email! Read one of their recent LinkedIn posts or find a common interest. Ex.: "I read your recent article about carbon capture and was really interested to learn about X, Y, and Z." Also, use first names where it feels appropriate. In the professional world, this is more common.</p>
        <p><strong>Have a clear ask:</strong> The last line of your email should be your ask, typically for a call. Specify a length, propose a few time options, and close with a thank you.</p>
        <p><strong>Now putting it all together:</strong></p>
        <div style="background:var(--cream);border-left:3px solid var(--orange);padding:20px;margin:16px 0;font-size:0.93rem;line-height:1.7;color:var(--black);">
          <p>Hey XXXXX,</p>
          <p>I hope you're doing well. I'm a Duke engineering graduate and Co-Founder of Energy Terminal. I read your recent LinkedIn post about carbon capture and was really interested to hear about how your company is partnering with natural gas pipeline companies to build CO2 transport pipelines. My primary interest is in the transition of traditional energy infrastructure toward sustainable applications, so I'd love to learn more about your work.</p>
          <p>Would you have time for a 20 minute call sometime next week? I'm free Monday and Tuesday afternoons as well as Wednesday morning. Please let me know what works best for you, and I'll send over a calendar invite. Thank you, and I'm looking forward to it!</p>
          <p>Best, Michael</p>
        </div>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Step 4: Before the Call</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Now that you've locked down a date with your networking contact, it's time to make sure you're ready. Dive deep into their background and their company to prepare relevant questions. They've already volunteered their valuable time to meet with you, so it's important to make sure you're well-prepared to make the best use of the time you're given.</p>
        <p>I suggest preparing a list of 5-10 questions. You won't get to all of them, most likely, but it helps to be over-prepared. Know in advance which questions you want to make sure you ask and focus on those first.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Step 5: During the Call</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Start with an introduction! It helps to have a well-rehearsed, short (60s or less) introduction about who you are, and ask them to introduce themselves too.</p>
        <p>Next, thank them for taking the time to speak with you and reiterate your reason for wanting to speak with them. Ex. I'm interested in a career in the nuclear energy industry and wanted to hear more about the work you / your company does.</p>
        <p>Once you get into the topics, spend most of your time listening. A good rule-of-thumb is to spend 80% of the time listening and 20% of the time talking. This is great for two reasons: you'll learn more the more they talk, and most people love to talk about themselves!</p>
        <p>While they're talking, take notes. I can't tell you the number of times that a small fact or reference I've written down during a call has come in handy later. Plus, it is very helpful to have on hand for a follow-up conversation.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Step 6: After the Call</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Most importantly, send a thank-you email within 24 hours of the meeting. This should be a short message thanking them for your time, referencing a specific part of the conversation that you found valuable, and setting the stage for a future meeting.</p>
        <p>Also, connect with them on LinkedIn if you haven't already. This is a great way to stay in touch and have interactions with them going forward.</p>
      </div></div>
    </div>
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Step 7: Rinse &amp; Repeat</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>The value of networking compounds itself tremendously. You're not going to be an expert overnight, so be bold and get out there!</p>
      </div></div>
    </div>
    <button class="btn btn-orange" style="margin-top:20px;cursor:pointer;" onclick="downloadNetworkingGuide()">⬇ Download Networking Guide</button>
  </div>
    
    
    <div class="card"><div class="card-icon">💬</div><h3>LinkedIn Messaging Templates</h3>
    <p>Below is a document of LinkedIn Messages that have gotten proven responses. The key is to be as impactful as you can with the character limit that you are given. The goal is for the person on the other end to see you clear interest, and want to connect with you. You have to be concise and get to the point with no characters to waste. See below for specific templates for specific industries / contacts.</p>

      <div class="accordion-header" onclick="toggleAccordion(this)">

      </div>

    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3 class="">Recruiter</h3>

      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        <p>Hi _____ ! My name is ____ and I am a student at _____ studying _____. I am really interested in the clean energy space and have been following _____'s work for a while! I would love to connect and learn about the opportunities at.</p>

    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <h3>Finance</h3>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>

      <div class="accordion-body"><div class="accordion-body-inner">
        <p>HI _____! My name is ______ and I am a current student at _____ studying ____. I am really interested in the intersection of clean energy and finance, and have been following _____ for a while. I would love to connect and learn more about the company and your work.</p>

<script>
function downloadAllTemplates() {
  var text = "COLD EMAIL TEMPLATES\n" +
    "====================\n\n" +
    "Attached below are multiple cold email templates that have gotten proven responses! Use the templates to reach out to industry professionals that you are hoping to network with.\n\n" +
    "--------------------\n" +
    "TEMPLATE 1\n" +
    "--------------------\n\n" +
    "Hello ____,\n\nMy name is _____, and I am a student at _______ studying _________. I was connected to you from ______. It's great to meet you! I am really interested in the clean energy and renewable sector, and know that your company ______ is doing a lot of great work with ___(Insert company's role in energy transition). I would love to learn more about the company and the work that you do, as well as hear about your experiences  ___(insert past experience of the person )_____ at ___(past/current organization of the person)__! I am currently working at ______ and have lot of previous experience working in the energy sector\n\nPlease let me know what days and times work best for you, and I can send over a calendar invite!\n\nI look forward to learning more about the company and your work!\n\nBest,\n\n______\n\n( Add an email signature to seem more professional)\n\n" +
    "--------------------\n" +
    "TEMPLATE 2\n" +
    "--------------------\n\n" +
    "Hello ____,\n\nMy name is _____, and I am a student at _______. I was working with ___(insert past experience here)___ last Summer and ended up learning a lot about your company _______. The work you are doing in _(insert energy interests here)___ really piqued my interest. These are two of my passions in the energy space which I am furthering through a __(insert description of work related to company's field)__ project.\n\nI was wondering if you would have time to talk some more about the work you all are doing. I would love to set up a time if that works for you!\n\nI look forward to hearing from you.\n\nBest,\n\n_____\n\n( Add an email signature to seem more professional)\n\n" +
    "--------------------\n" +
    "TEMPLATE 3\n" +
    "--------------------\n\n" +
    "Hello ____,\n\nMy name is _____, and I am a student at _______ studying _________. I was connected to you from ______, who I had connected with and was talking to his work at ______. He recommended I reach out to you so I wanted to go ahead and introduce myself!\n\nI am really interested in ______ and would love to learn more about your role and what you do with the company. If you have any time over the next few days, I'd love to set up at time for a quick coffee chat.\n\nLet me know when is best for you and I can send over a calendar invite!\n\nI look forward to connecting and talking soon.\n\nBest,\n\n______\n\n( Add an email signature to seem more professional)";
  var blob = new Blob([text], {type: 'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cold-email-templates.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}
function downloadAcronyms() {
  var text = "COMMON ENERGY ACRONYMS\n" +
    "======================\n\n" +
    "AC — Alternating Current\nA type of electrical current in which the direction of the flow of electrons switches back and forth at regular intervals. Most current flowing in power lines and household electricity coming from wall outlets is alternating current. Easier to increase or decrease the voltage of AC with transformers.\n\n" +
    "BESS — Battery Energy Storage System\nRechargeable batteries that can store energy from different sources and discharge it when needed, most commonly paired with solar. Battery energy storage systems vary in size (residential, commercial, utility-scale), chemistry, and storage duration. Key for addressing renewable intermittency.\n\n" +
    "CAPEX — Capital Expenditures\nFunds used by a company to acquire, upgrade, and maintain long-term physical assets. In energy terms, this most often refers to the upfront cost of building a new power plant.\n\n" +
    "CCUS — Carbon Capture Utilization and Storage\nProcess that captures carbon dioxide emissions from large point sources (such as fossil power plants or industrial facilities) and either reuses or stores it so it will not enter the atmosphere. Currently an expensive process but will be crucial for difficult to decarbonize sectors and may become more prevalent in light of recent EPA rules.\n\n" +
    "CF — Capacity Factor\nRatio of the actual electrical energy produced by a generating unit over a period of time compared to its theoretical maximum power production during the same period. For example, nuclear has a high capacity factor while solar has a relatively low capacity factor (given its lack of production at night).\n\n" +
    "COD — Commercial Operations Date\nThe date large-scale energy projects come online and begin generating power to earn revenue.\n\n" +
    "DAC — Direct Air Capture\nProcess that extracts CO2 directly from the atmosphere at any location (not just large point source emitters) for permanent storage. Considered a carbon removal technique rather than carbon capture. Energy-intensive and currently very expensive.\n\n" +
    "DC — Direct Current\nAn electric current following one direction only. Direct current is used for recharging batteries and transmitting electricity over long distances to minimize loss. Solar panels also produce direct current.\n\n" +
    "DER — Distributed Energy Resource\nSmall-scale energy resources usually situated near sites of electricity use, such as rooftop solar panels and battery storage.\n\n" +
    "EPC — Engineering, Procurement, and Construction\nFirms in charge of getting a large-scale energy infrastructure project built. They create engineering blueprints, purchase raw materials, and physically construct the project. The EPC may or may not be owned by the independent power producer (see below) that \"developed\" (planned/financed) the project.\n\n" +
    "IOU — Investor-Owned Utility\nPrivate (for-profit), monopoly utilities that generate and distribute power to electric customers over their defined service territory. Regulated by PUCs (see below). Examples include Duke Energy, Southern Company, First Energy, Dominion Energy, etc.\n\n" +
    "IPP — Independent Power Producer\nAlso known as a non-utility generator (NUG), an IPP is an entity that is not a public utility but owns facilities to generate electricity for sale to utilities or end users. Most energy developers are considered IPPs (i.e. Pattern Energy, Cypress Creek Renewables, etc.). It is important to note that some utilities have IPP branches that operate in complete isolation from the utility (i.e NextEra Energy, Duke Energy, etc.).\n\n" +
    "IRP — Integrated Resource Plan\nAn assessment of future electricity needs and a plan to meet those future needs carried out by public utilities. Essentially a planning tool to help utilities forecast their future energy mix.\n\n" +
    "ISO — Independent System Operator\nIndependent organizations that handle electric grid operations, electricity market facilitation, and bulk electric system planning. Similar to RTOs but generally have a smaller service territory.\n\n" +
    "ITC — Investment Tax Credit\nMost often utilized for solar plant construction, ITCs reduce the federal income tax liability for a developer by a certain percent of the total system cost (CAPEX). Currently, the federal ITC for renewables is 30%, but there are additional 10% bonuses for meeting domestic content requirements and being located in \"energy communities.\" Often developers don't use the tax credits themselves, but sell them to banks through tax equity deals.\n\n" +
    "kW — Kilowatt\n1,000 watts, a measure of power. 1 watt = 1 joule per second. For example, power tools and air fryers typically require about 1 kW of power.\n\n" +
    "kWh — Kilowatt Hour\n1,000 Watt hours, a measure of energy. It is the unit of measure for using 1 kW of power for one hour. For example, if a power tool was rated at 1 kW and you used it for 1 hour, you would have consumed 1 kWh of electricity. The average U.S. household consumes 29 kWh/day.\n\n" +
    "LCOE — Levelized Cost of Energy/Electricity\nMeasures lifetime costs of a power plant divided by total energy production. Inputs include CAPEX, fuel costs (if applicable), operations & maintenance expenses, etc. Used to compare the relative prices of different types of energy generation.\n\n" +
    "LNG — Liquified Natural Gas\nNatural gas that has been cooled to liquid form (~260° Fahrenheit) to allow for long-distance shipping and extended storage. LNG is generally more expensive than pipeline natural gas, but it has created a global gas market and is the only feasible source of gas for some countries without reserves. The U.S. is currently building out its LNG export capacity.\n\n" +
    "MW — Megawatt\n1,000,000 watts, a measure of power. 1 watt = 1 joule per second. 1 MW is roughly enough electricity for the instantaneous demand of 750 homes at once.\n\n" +
    "MWh — Megawatt Hour\n1,000,000 Watt hours, a measure of energy. It is the unit of measure for using 1 MW of power for one hour. The average U.S. household uses a little over 1MWh/month.\n\n" +
    "NGCC — Natural Gas Combined Cycle\nThe dominant type of natural gas power plant in operation, a combined cycle plant captures excess heat from the gas turbine in order to run an additional steam turbine. This in turn is much more efficient than a traditional single turbine gas plant.\n\n" +
    "O&M — Operations & Maintenance\nActivities associated with running and maintaining the power plant once it is in operation. Includes replacing broken parts, cleaning solar panels, landscaping, etc.\n\n" +
    "PPA — Power Purchase Agreement\nLong-term contract between an electricity generator and a customer (most often utilities and large companies). Most large-scale renewables projects have a PPA, as having a guaranteed buyer of the generated electricity at a set rate derisks the project and justifies the upfront capital spend.\n\n" +
    "PTC — Production Tax Credit\nTax credits that are generated per kilowatt-hour of electricity produced by qualifying renewables facilities during the first 10 years of operation (up to 2.75 cents/kWh). Generally developers can either claim a production tax credit or investment tax credit, not both. Wind farms are the most likely to claim the production tax credits.\n\n" +
    "PUC — Public Utility Commission\nQuasi-governmental body that provides oversight and/or regulation of public utilities in a certain area (usually a state). Approve electric rates and capital expenditures of IOUs. Their goal is generally to ensure that utilities provide reasonable, adequate and efficient service to customers at just and reasonable prices.\n\n" +
    "PV — Photovoltaic\nEssentially \"solar.\" Usually appears as PV (solar) plant or PV (solar) cell, which is a nonmechanical device that converts sunlight directly into electricity.\n\n" +
    "RTO — Regional Transmission Operator\nOrganization that coordinates, controls, and monitors the operation of the electric power system across a large geographic area. Serves the same functions as an ISO, but RTOs are generally larger, often spanning across many states.";
  var blob = new Blob([text], {type: 'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'common-energy-acronyms.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}
function downloadNetworkingGuide() {
  var text = "NETWORKING GUIDE\n" +
    "================\n\n" +
    "Networking is often viewed as a necessary evil or an awkward task, but it doesn't have to be.\n\n" +
    "This guide will serve as an introduction to networking and walk you through the process of a successful networking experience.\n\n" +
    "Starting off, here are a few things to keep in mind.\n\n" +
    " - Most people enjoy connecting with students. That \".edu\" email is a huge asset and will open a lot of doors, so don't be shy.\n\n" +
    " - Know your audience and do your homework. Personalization is key, and know how to adjust your tone to fit the situation.\n\n" +
    " - Don't ask for a job (at least not right away).\n\n" +
    " - Networking compounds itself. Consistent effort is critical to seeing exponential benefits\n\n" +
    "--------------------\n" +
    "Step 1: Finding the Right Tools\n" +
    "--------------------\n\n" +
    "LinkedIn will be your friend here. If you haven't already, make sure to touch up your profile with the most recent information, such as any recent work experience or projects. Alumni databases are also an excellent place to find people from your school working in your desired industry or in your desired role. Most of them have their emails included, too.\n\n" +
    "--------------------\n" +
    "Step 2: Finding the Right People to Network With\n" +
    "--------------------\n\n" +
    "To get to this point, we'll assume you've narrowed down your interest to a specific group or type of company. If not, see our \"how to narrow your interests in the energy industry\" or head over to our Energy Verticals page to read up on a few verticals you might be interested in. Once you've done that and identified a few companies you might be interested in, come back here for the next steps.\n\n" +
    "There are two important things to keep in mind when you're identifying the right person to reach out to. First, who is going to have the right experience or information to answer my question? Second, what common ground can I establish with this person?\n\n" +
    "For the first point, look for job titles that match your interests. For example, if you're interested in a marketing role, look for keywords like \"marketing\" or \"communications.\"\n\n" +
    "For the second point, scroll through their LinkedIn profile to learn more about them. Did they have the same major as you? Did they go to the same school? Are they from the same city? All of these points can be great conversation starters and make them more likely to connect with you. Alumni of your school can be a great place to start, and many schools have an online database where you can find emails, bios, and more.\n\n" +
    "Another common question is what level of seniority you should target. In general, for most informational interviews, we would recommend someone within 10 years of your current level of experience. They were in your shoes not too long ago, can relate to you well, and can provide greater insight into entry level positions like the ones you might be interested in. Plus, they're probably more likely to respond.\n\n" +
    "At the end of this step, we've found our ideal target. On to step 3!\n\n" +
    "--------------------\n" +
    "Step 3: Crafting the Perfect Message\n" +
    "--------------------\n\n" +
    "For this step, head over to our LinkedIn message or cold email templates for more information.\n\n" +
    "Here are a few things to keep in mind:\n\n" +
    " - Keep it short.\n" +
    " - Make it personal.\n" +
    " - Have a clear ask.\n\n" +
    "Keep it short: A great message should be short enough that they can read it in 20-30 seconds and clear enough that they can instantly understand why you're reaching out to them. You don't need to recite your resume; a simple one-liner including your school, major, and relevant position at a company/organization will do. Ex.: \"I'm a Duke engineering student and the Co-Founder of Energy Terminal.\"\n\n" +
    "Make it personal: Do your homework not just before the call, but before the email! Read one of their recent LinkedIn posts or find a common interest. Ex.: \"I read your recent article about carbon capture and was really interested to learn about X, Y, and Z.\" Also, use first names where it feels appropriate. In the professional world, this is more common.\n\n" +
    "Have a clear ask: The last line of your email should be your ask, typically for a call. Specify a length, propose a few time options, and close with a thank you.\n\n" +
    "Now putting it all together:\n\n" +
    "Hey XXXXX,\n\n" +
    "I hope you're doing well. I'm a Duke engineering graduate and Co-Founder of Energy Terminal. I read your recent LinkedIn post about carbon capture and was really interested to hear about how your company is partnering with natural gas pipeline companies to build CO2 transport pipelines. My primary interest is in the transition of traditional energy infrastructure toward sustainable applications, so I'd love to learn more about your work.\n\n" +
    "Would you have time for a 20 minute call sometime next week? I'm free Monday and Tuesday afternoons as well as Wednesday morning. Please let me know what works best for you, and I'll send over a calendar invite. Thank you, and I'm looking forward to it!\n\n" +
    "Best, Michael\n\n" +
    "--------------------\n" +
    "Step 4: Before the Call\n" +
    "--------------------\n\n" +
    "Now that you've locked down a date with your networking contact, it's time to make sure you're ready. Dive deep into their background and their company to prepare relevant questions. They've already volunteered their valuable time to meet with you, so it's important to make sure you're well-prepared to make the best use of the time you're given.\n\n" +
    "I suggest preparing a list of 5-10 questions. You won't get to all of them, most likely, but it helps to be over-prepared. Know in advance which questions you want to make sure you ask and focus on those first.\n\n" +
    "--------------------\n" +
    "Step 5: During the Call\n" +
    "--------------------\n\n" +
    "Start with an introduction! It helps to have a well-rehearsed, short (60s or less) introduction about who you are, and ask them to introduce themselves too.\n\n" +
    "Next, thank them for taking the time to speak with you and reiterate your reason for wanting to speak with them. Ex. I'm interested in a career in the nuclear energy industry and wanted to hear more about the work you / your company does.\n\n" +
    "Once you get into the topics, spend most of your time listening. A good rule-of-thumb is to spend 80% of the time listening and 20% of the time talking. This is great for two reasons: you'll learn more the more they talk, and most people love to talk about themselves!\n\n" +
    "While they're talking, take notes. I can't tell you the number of times that a small fact or reference I've written down during a call has come in handy later. Plus, it is very helpful to have on hand for a follow-up conversation.\n\n" +
    "--------------------\n" +
    "Step 6: After the Call\n" +
    "--------------------\n\n" +
    "Most importantly, send a thank-you email within 24 hours of the meeting. This should be a short message thanking them for your time, referencing a specific part of the conversation that you found valuable, and setting the stage for a future meeting.\n\n" +
    "Also, connect with them on LinkedIn if you haven't already. This is a great way to stay in touch and have interactions with them going forward.\n\n" +
    "--------------------\n" +
    "Step 7: Rinse & Repeat\n" +
    "--------------------\n\n" +
    "The value of networking compounds itself tremendously. You're not going to be an expert overnight, so be bold and get out there!";
  var blob = new Blob([text], {type: 'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'networking-guide.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function toggleAccordion(header) {
  const item = header.parentElement;
  const body = item.querySelector('.accordion-body');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.accordion-item').forEach(i => {
    i.classList.remove('open');
    i.querySelector('.accordion-body').style.maxHeight = null;
  });
  if (!isOpen) {
    item.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}
