<div class="page-hero">
  <p class="page-hero-eyebrow">About Energy Terminal</p>
  <h1 class="">Our <em>Mission</em></h1>
  <p>We exist to bridge the gap between students and the energy industry — making this exciting sector accessible, navigable, and exciting for the next generation of leaders.</p>
</div>

<div class="page-content">
<div class="content-grid" style="text-align: left; gap: 54px; display: block;">
    <div class="">
      <h2 style="font-family:Playfair Display,serif;font-size:1.8rem;font-weight:800;margin-bottom:20px;" class="">Why Energy Terminal Exists</h2>
      <p style="color: rgb(107, 107, 107); line-height: 1.75; margin-bottom: 20px; width: 100%;" class="">The energy sector is one of the most consequential industries of our time — shaping climate outcomes, economic opportunity, and global development. Yet for most students, it remains opaque and hard to enter.</p>
      <p style="color:#6b6b6b;line-height:1.75;margin-bottom:20px;" class="">Energy Terminal was founded to change that. We provide the resources, community, and connections students need to discover, explore, and launch careers in energy and climate.</p>
      <p style="color:#6b6b6b;line-height:1.75;" class="">From renewable energy to oil &amp; gas, from policy to finance — we cover the full spectrum of the energy world, without gatekeeping or jargon.</p>
    </div>
    
  </div>
  <hr class="section-divider">
  <h2 style="font-family:Playfair Display,serif;font-size:2rem;font-weight:800;margin-bottom:40px;" class="">Our Three Pillars</h2>
  <div class="content-grid">
    <div class="card"><span class="card-tag">Learn</span><h3>Education &amp; Resources</h3><p>Curated content across every energy niche — from nuclear power to carbon markets. Our resource hub and podcast make learning accessible.</p><a href="resource-hub.html" class="btn btn-bordered">Explore Resources</a></div>
    <div class="card"><span class="card-tag">Connect</span><h3>Community &amp; Network</h3><p>Students from 40+ universities connected through our Community Hub and Emerging Leaders Program. Build relationships that last a career.</p><a href="join.html" class="btn btn-bordered">Join Today</a></div>
    <div class="card"><span class="card-tag">Recruit</span><h3>Career Development</h3><p>Practical tools for getting hired — company databases, recruiting guides, networking templates, and more. We help you land the role.</p><a href="career-pathways.html" class="btn btn-bordered">Career Pathways</a></div>
  </div>
