<div class="page-hero"><p class="page-hero-eyebrow">Programs</p><h1><em>Virtual Visits</em></h1><p>Go behind the scenes of leading energy companies through our exclusive virtual visit series — no flight required.</p></div>
<div class="page-content"><div class="content-grid">
    <div class=""><h2 style="font-family:Playfair Display,serif;font-size:1.8rem;font-weight:800;margin-bottom:20px;" class="">hello my dear</h2><p style="color:#6b6b6b;line-height:1.75;margin-bottom:16px;" class="">Virtual Visits are live, interactive sessions hosted with energy companies, startups, nonprofits, and government bodies. Each session gives students a window into what it is really like to work there.</p><p style="color:#6b6b6b;line-height:1.75;" class="">Sessions typically include a company overview, employee panel Q&amp;A, and information on internship and full-time opportunities. All sessions are recorded for ET community members who cannot attend live.</p></div>
    <div class="card"><div class="card-icon">🏢</div><h3>Past Visit Highlights</h3><p>We have hosted visits with companies across renewables, oil &amp; gas, climate tech, energy finance, and public policy organizations.</p><a href="join.html" class="btn btn-bordered" style="margin-top:8px;">Join to Access Recordings</a></div>
    <div class="card"><div class="card-icon">📅</div><h3>Upcoming Visits</h3><p>New virtual visits are scheduled each month. Community members receive advance notice and registration links directly to their inbox.</p><a href="join.html" class="btn btn-bordered" style="margin-top:8px;">Join the Community</a></div>
    <div class="card"><div class="card-icon">🤝</div><h3>Partner With Us</h3><p>Are you an energy company or organization interested in hosting a virtual visit? We would love to connect you with our engaged student audience.</p><a href="mailto:team@energy-terminal.com" class="btn btn-bordered" style="margin-top:8px;">Get in Touch</a></div>
