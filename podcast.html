<div class="page-hero"><p class="page-hero-eyebrow">Content</p><h1 class="">The Energy Terminal <em class="">Podcast</em></h1><p class="">In-depth conversations with energy professionals, founders, policymakers, and investors — giving students an inside look at careers and ideas shaping our energy future.</p></div>
<div class="page-content"><div class="content-grid">
    <div class=""><h2 style="font-family:Playfair Display,serif;font-size:1.8rem;font-weight:800;margin-bottom:20px;" class="">About the Podcast</h2><p style="color:#6b6b6b;line-height:1.75;margin-bottom:16px;" class="">Each episode features a candid conversation with an energy professional from a wide range of backgrounds — renewable energy developers, ESG investors, policy advocates, climate tech founders, and more.</p><p style="color:#6b6b6b;line-height:1.75;" class="">Our goal is to make this exciting industry feel accessible, not intimidating. No jargon, no gatekeeping — just honest conversations about what it is like to work in energy.</p></div>
